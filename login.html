<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PawDee — เข้าสู่ระบบ</title>
  <link rel="icon" href="Pawdee Logo.png" type="image/png"/>
  <meta name="description" content="เข้าสู่ระบบหรือสมัครสมาชิก PawDee เพื่อจัดการร้านและบันทึกสถานที่โปรด"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://pawdee.vercel.app/login"/>
  <meta property="og:title" content="PawDee — เข้าสู่ระบบ"/>
  <meta property="og:description" content="เข้าสู่ระบบหรือสมัครสมาชิก PawDee เพื่อจัดการร้านและบันทึกสถานที่โปรด"/>
  <meta property="og:image" content="https://pawdee.vercel.app/animals-hero.png.png"/>
  <meta property="og:locale" content="th_TH"/>
  <meta property="og:site_name" content="PawDee"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: { orange:'#F97316','orange-deep':'#EA580C',cream:'#FFFBEB' } },
          fontFamily: { sans: ['Kanit','ui-sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { font-family:'Kanit',sans-serif; }
    .paw-bg { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23F97316' fill-opacity='0.05'%3E%3Cellipse cx='15' cy='10' rx='4' ry='5'/%3E%3Cellipse cx='30' cy='8' rx='4' ry='5'/%3E%3Cellipse cx='45' cy='10' rx='4' ry='5'/%3E%3Cellipse cx='30' cy='35' rx='12' ry='14'/%3E%3C/g%3E%3C/svg%3E"); }
    .input-field { @apply w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-white focus:outline-none focus:border-brand-orange transition-colors text-gray-800 placeholder-gray-400 text-sm; }
    .btn-primary { @apply w-full bg-brand-orange text-white py-3 rounded-xl font-bold hover:bg-brand-orange-deep transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed; }
  </style>
</head>
<body class="min-h-screen bg-brand-cream paw-bg flex items-center justify-center p-4 relative overflow-hidden">

<!-- Decorative animals -->
<div class="hidden sm:block absolute bottom-0 left-0 pointer-events-none select-none" style="width:160px;">
  <img src="animals-hero.png.png" alt="" class="w-full object-contain object-bottom opacity-60" style="mask-image:linear-gradient(to right, black 40%, transparent 100%);-webkit-mask-image:linear-gradient(to right, black 40%, transparent 100%);" />
</div>
<div class="hidden sm:block absolute bottom-0 right-0 pointer-events-none select-none" style="width:160px;">
  <img src="animals-hero.png.png" alt="" class="w-full object-contain object-bottom opacity-60" style="transform:scaleX(-1);mask-image:linear-gradient(to left, black 40%, transparent 100%);-webkit-mask-image:linear-gradient(to left, black 40%, transparent 100%);" />
</div>

  <!-- Card -->
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-6 sm:mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 justify-center">
        <img src="Pawdee Logo.png" alt="PawDee" class="h-10 w-auto"/>
        <span class="text-2xl font-bold text-gray-900">Paw<span class="text-brand-orange">Dee</span></span>
      </a>
      <p class="text-gray-500 text-sm mt-2">แพลตฟอร์มครบวงจรสำหรับ 🐕 🐈 🐇</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8">
      <!-- Tabs -->
      <div class="flex bg-gray-100 rounded-2xl p-1 mb-6">
        <button id="tabLogin" class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all bg-white shadow text-gray-900">
          เข้าสู่ระบบ
        </button>
        <button id="tabSignup" class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all text-gray-500 hover:text-gray-700">
          สมัครสมาชิก
        </button>
      </div>

      <!-- Error/Success Banner -->
      <div id="banner" class="hidden mb-4 p-3 rounded-xl text-sm font-medium"></div>

      <!-- Google Button -->
      <button id="googleBtn" class="w-full flex items-center justify-center gap-3 border-2 border-gray-200 py-3 rounded-xl font-semibold text-gray-700 hover:border-brand-orange hover:text-brand-orange transition-all mb-4">
        <svg class="w-5 h-5" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        เข้าสู่ระบบด้วย Google
      </button>

      <!-- Divider -->
      <div class="relative mb-4">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
        <div class="relative flex justify-center"><span class="bg-white px-3 text-xs text-gray-400">หรือใช้อีเมล</span></div>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="space-y-3">
          <input id="loginEmail" type="email" placeholder="อีเมล" class="input-field" required/>
          <div class="relative">
            <input id="loginPassword" type="password" placeholder="รหัสผ่าน" class="input-field pr-10" required/>
            <button type="button" class="toggle-pw absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">👁️</button>
          </div>
          <div class="text-right">
            <button type="button" id="forgotBtn" class="text-xs text-brand-orange hover:underline">ลืมรหัสผ่าน?</button>
          </div>
          <button type="submit" class="btn-primary">เข้าสู่ระบบ</button>
        </div>
      </form>

      <!-- Signup Form (hidden) -->
      <form id="signupForm" class="hidden">
        <div class="space-y-3">
          <input id="signupName" type="text" placeholder="ชื่อ-นามสกุล" class="input-field" required/>
          <input id="signupEmail" type="email" placeholder="อีเมล" class="input-field" required/>
          <div class="relative">
            <input id="signupPassword" type="password" placeholder="รหัสผ่าน (อย่างน้อย 6 ตัว)" class="input-field pr-10" required minlength="6"/>
            <button type="button" class="toggle-pw absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">👁️</button>
          </div>
          <label class="flex items-start gap-2 text-xs text-gray-600 cursor-pointer">
            <input type="checkbox" required class="mt-0.5 accent-orange-500"/>
            <span>ยอมรับ <a href="terms.html" class="text-brand-orange underline">เงื่อนไขการใช้งาน</a> และ <a href="privacy.html" class="text-brand-orange underline">นโยบายความเป็นส่วนตัว</a></span>
          </label>
          <button type="submit" class="btn-primary">สมัครสมาชิกฟรี</button>
        </div>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      <a href="index.html" class="hover:text-brand-orange transition-colors">← กลับหน้าหลัก</a>
    </p>
  </div>

<script type="module">
  import { signInWithGoogle, signInWithEmail, signUpWithEmail, resetPassword, onAuthChange } from './js/auth.js';

  // redirect ถ้า login อยู่แล้ว
  onAuthChange(user => {
    if (user) {
      const next = new URLSearchParams(location.search).get('next') || 'index.html';
      location.href = next;
    }
  });

  // ── Tab switching ─────────────────────────────────────────────
  const tabLogin  = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const loginForm  = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  const activeTab   = 'bg-white shadow text-gray-900';
  const inactiveTab = 'text-gray-500 hover:text-gray-700';

  function showTab(tab) {
    if (tab === 'login') {
      tabLogin.className  = `flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${activeTab}`;
      tabSignup.className = `flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${inactiveTab}`;
      loginForm.classList.remove('hidden');
      signupForm.classList.add('hidden');
    } else {
      tabSignup.className = `flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${activeTab}`;
      tabLogin.className  = `flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${inactiveTab}`;
      signupForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    }
    hideBanner();
  }

  tabLogin.addEventListener('click',  () => showTab('login'));
  tabSignup.addEventListener('click', () => showTab('signup'));

  if (new URLSearchParams(location.search).get('tab') === 'signup') showTab('signup');

  // ── Banner ────────────────────────────────────────────────────
  function showBanner(msg, type = 'error') {
    const b = document.getElementById('banner');
    b.textContent = msg;
    b.className = `mb-4 p-3 rounded-xl text-sm font-medium ${
      type === 'error'   ? 'bg-red-50 text-red-700 border border-red-200' :
      type === 'success' ? 'bg-green-50 text-green-700 border border-green-200' :
                           'bg-blue-50 text-blue-700 border border-blue-200'
    }`;
    b.classList.remove('hidden');
  }
  function hideBanner() { document.getElementById('banner').classList.add('hidden'); }

  // ── Error messages ────────────────────────────────────────────
  function friendlyError(code) {
    const map = {
      'auth/user-not-found':       'ไม่พบบัญชีนี้ กรุณาสมัครสมาชิกก่อน',
      'auth/wrong-password':       'รหัสผ่านไม่ถูกต้อง',
      'auth/invalid-credential':   'อีเมลหรือรหัสผ่านไม่ถูกต้อง',
      'auth/email-already-in-use': 'อีเมลนี้ถูกใช้แล้ว กรุณาเข้าสู่ระบบ',
      'auth/weak-password':        'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร',
      'auth/invalid-email':        'รูปแบบอีเมลไม่ถูกต้อง',
      'auth/popup-closed-by-user': 'ยกเลิกการเข้าสู่ระบบ',
      'auth/too-many-requests':    'พยายามเข้าสู่ระบบบ่อยเกินไป กรุณารอสักครู่',
    };
    return map[code] || 'เกิดข้อผิดพลาด กรุณาลองอีกครั้ง';
  }

  // ── Google Login ──────────────────────────────────────────────
  document.getElementById('googleBtn').addEventListener('click', async () => {
    try {
      await signInWithGoogle();
    } catch (err) {
      showBanner(friendlyError(err.code));
    }
  });

  // ── Email Login ───────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
    try {
      await signInWithEmail(
        document.getElementById('loginEmail').value,
        document.getElementById('loginPassword').value
      );
    } catch (err) {
      showBanner(friendlyError(err.code));
      btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
    }
  });

  // ── Email Signup ──────────────────────────────────────────────
  document.getElementById('signupForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'กำลังสมัคร...';
    try {
      await signUpWithEmail(
        document.getElementById('signupEmail').value,
        document.getElementById('signupPassword').value,
        document.getElementById('signupName').value
      );
      showBanner('สมัครสำเร็จ! กำลังพาไปหน้าหลัก...', 'success');
    } catch (err) {
      showBanner(friendlyError(err.code));
      btn.disabled = false; btn.textContent = 'สมัครสมาชิกฟรี';
    }
  });

  // ── Forgot Password ───────────────────────────────────────────
  document.getElementById('forgotBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value;
    if (!email) { showBanner('กรุณากรอกอีเมลก่อน'); return; }
    try {
      await resetPassword(email);
      showBanner('ส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลแล้ว', 'success');
    } catch (err) {
      showBanner(friendlyError(err.code));
    }
  });

  // ── Toggle Password Visibility ────────────────────────────────
  document.querySelectorAll('.toggle-pw').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = btn.previousElementSibling;
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    });
  });
</script>
</body>
</html>
